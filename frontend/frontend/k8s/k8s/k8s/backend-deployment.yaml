apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: youracr.azurecr.io/backend:latest  # Update after build/push
        env:
        - name: REDIS_HOST
          value: "redis"
        ports:
        - containerPort: 5000
